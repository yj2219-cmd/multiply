<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>구구단 마스터 - 초등 3학년</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Gaegu', cursive;
            background-color: #f0f9ff;
        }
        .card {
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }
        .shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="game-container" class="max-w-md w-full bg-white rounded-3xl p-8 card text-center">
        <!-- 시작 화면 -->
        <div id="start-screen">
            <h1 class="text-5xl font-bold text-blue-600 mb-6">구구단 마스터! 🏆</h1>
            <p class="text-xl text-gray-600 mb-8">10문제를 가장 빨리 풀어보세요!<br>기록에 따라 멋진 등급을 줄게요.</p>
            <button onclick="startGame()" class="bg-yellow-400 hover:bg-yellow-500 text-blue-900 text-2xl font-bold py-4 px-10 rounded-full transition-all transform hover:scale-105">
                게임 시작!
            </button>
        </div>

        <!-- 게임 진행 화면 -->
        <div id="game-screen" class="hidden">
            <div class="flex justify-between items-center mb-6">
                <span class="bg-blue-100 text-blue-800 px-4 py-1 rounded-full text-lg">문제: <span id="current-count">1</span> / 10</span>
                <span id="timer" class="text-red-500 font-bold text-2xl">0.0초</span>
            </div>

            <div id="problem-box" class="py-12 bg-blue-50 rounded-2xl mb-8">
                <div class="text-7xl font-bold text-gray-800" id="problem-text">2 × 3 = ?</div>
            </div>

            <div class="relative mb-4">
                <input type="number" id="answer-input" 
                    class="w-full text-4xl border-4 border-blue-200 rounded-xl p-4 text-center focus:outline-none focus:border-blue-500 transition-colors" 
                    placeholder="정답 입력"
                    onkeyup="if(window.event.keyCode==13){checkAnswer()}">
            </div>
            
            <button onclick="checkAnswer()" class="w-full bg-blue-500 hover:bg-blue-600 text-white text-2xl font-bold py-4 rounded-xl shadow-lg transition-all">
                입력 완료 (Enter)
            </button>
            <p id="feedback" class="mt-4 text-xl font-bold h-8"></p>
        </div>

        <!-- 결과 화면 -->
        <div id="result-screen" class="hidden">
            <h2 class="text-4xl font-bold text-gray-800 mb-4">참 잘했어요! 🌟</h2>
            <div class="text-2xl mb-2">총 소요 시간: <span id="final-time" class="font-bold text-red-500">0.0</span>초</div>
            
            <div class="my-8 p-6 bg-yellow-50 rounded-2xl border-2 border-yellow-200">
                <div class="text-lg text-gray-600 mb-2">나의 등급</div>
                <div id="grade-text" class="text-5xl font-black text-yellow-600">S급 마스터</div>
                <div id="grade-desc" class="mt-2 text-gray-500">번개같은 실력이에요!</div>
            </div>

            <button onclick="resetGame()" class="bg-gray-200 hover:bg-gray-300 text-gray-700 text-xl font-bold py-3 px-8 rounded-full transition-all">
                다시 도전하기
            </button>
        </div>
    </div>

    <script>
        let currentProblem = 0;
        let correctAnswers = 0;
        let startTime = 0;
        let timerInterval;
        let num1, num2;
        const totalProblems = 10;

        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            document.getElementById('result-screen').classList.add('hidden');
            
            currentProblem = 1;
            startTime = Date.now();
            
            updateTimer();
            timerInterval = setInterval(updateTimer, 100);
            nextProblem();
        }

        function updateTimer() {
            const now = Date.now();
            const diff = (now - startTime) / 1000;
            document.getElementById('timer').innerText = diff.toFixed(1) + '초';
        }

        function nextProblem() {
            // 2단~9단까지 무작위 추출
            num1 = Math.floor(Math.random() * 8) + 2; 
            num2 = Math.floor(Math.random() * 9) + 1;
            
            document.getElementById('problem-text').innerText = `${num1} × ${num2} = ?`;
            document.getElementById('current-count').innerText = currentProblem;
            document.getElementById('answer-input').value = '';
            document.getElementById('answer-input').focus();
            document.getElementById('feedback').innerText = '';
        }

        function checkAnswer() {
            const userAnswer = parseInt(document.getElementById('answer-input').value);
            const correctAnswer = num1 * num2;
            const feedback = document.getElementById('feedback');
            const problemBox = document.getElementById('problem-box');

            if (isNaN(userAnswer)) return;

            if (userAnswer === correctAnswer) {
                feedback.innerText = "정답입니다! 🎉";
                feedback.className = "mt-4 text-xl font-bold text-green-500";
                
                if (currentProblem < totalProblems) {
                    currentProblem++;
                    setTimeout(nextProblem, 500);
                } else {
                    endGame();
                }
            } else {
                feedback.innerText = "틀렸어요! 다시 생각해보세요. 🤔";
                feedback.className = "mt-4 text-xl font-bold text-red-500";
                problemBox.classList.add('shake');
                setTimeout(() => problemBox.classList.remove('shake'), 500);
                document.getElementById('answer-input').value = '';
                document.getElementById('answer-input').focus();
            }
        }

        function endGame() {
            clearInterval(timerInterval);
            const endTime = Date.now();
            const totalSeconds = ((endTime - startTime) / 1000).toFixed(1);
            
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('final-time').innerText = totalSeconds;

            // 등급 판정
            let grade = "";
            let desc = "";
            const time = parseFloat(totalSeconds);

            if (time <= 20) {
                grade = "신(God) 등급 ⚡";
                desc = "인간이 아니시군요! 구구단의 신입니다!";
            } else if (time <= 35) {
                grade = "S급 마스터 🏆";
                desc = "정말 대단해요! 구구단 박사님이시네요!";
            } else if (time <= 50) {
                grade = "A급 우등생 ⭐";
                desc = "훌륭합니다! 실력이 아주 뛰어나요.";
            } else if (time <= 70) {
                grade = "B급 노력가 👍";
                desc = "잘하고 있어요! 조금만 더 연습해볼까요?";
            } else {
                grade = "C급 꿈나무 🌱";
                desc = "천천히 끝까지 풀어낸 당신이 최고예요!";
            }

            document.getElementById('grade-text').innerText = grade;
            document.getElementById('grade-desc').innerText = desc;
        }

        function resetGame() {
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('start-screen').classList.remove('hidden');
        }
    </script>
</body>
</html>
